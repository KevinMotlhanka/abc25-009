<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lim's Royal Boutique - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="logo-container">
      <a href="index.html">
        <img src="images/logo/logo.png" alt="Lim's Royal Boutique Logo" />
      </a>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <nav class="navbar" id="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        <li><a href="login.html" class="active">Login</a></li>
      </ul>
    </nav>
  </header>

  <main class="login-page">
    <section class="login-section">
      <div class="login-card">
        <div class="login-crown">♛</div>
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-sub">Sign in to your account</p>

        <div class="login-divider"><span>✦</span></div>

        <div class="login-field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div class="login-forgot">
          <a href="#">Forgot your password?</a>
        </div>

        <button class="btn-login" onclick="handleLogin()">Sign In</button>

        <p class="login-register">
          Don't have an account? <a href="#">Create one</a>
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p class="in-foot">© 2026 Lim's Royal Boutique. All rights reserved.</p>
  </footer>

  <script>
    // Hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const navbar = document.getElementById('navbar');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navbar.classList.toggle('open');
    });

    // Login handler
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        alert('Please enter your email and password.');
        return;
      }
      // Placeholder — connect to your backend here
      alert('Login functionality coming soon!');
    }
  </script>

</body>
</html>
