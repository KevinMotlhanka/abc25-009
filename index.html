<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIM'S ROYAL BOUTIQUE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html"><img src="images/logo/logo.png"></a>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <!-- VIDEO + TEXT directly on top, no white box -->
  <main>
    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="images/videos/purple sneaker.mp4" type="video/mp4">
      </video>
      <div class="content">
        <h2 class="hero-title">Welcome to Lim's Royal Boutique</h2>
        <p class="hero-sub">You want it we've got it.</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="foot">
    <p class="in-foot">&copy; 2026 Lim's Royal Boutique. All rights reserved.</p>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navbar = document.querySelector('.navbar');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navbar.classList.toggle('open');
    });
  </script>

</body>
</html>
