<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lim's Royal Boutique - Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="banner">
    <a href="index.html"><img src="images/logo/logo.png"></a>
    <img src="images/background-img/feedback.jpg">

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <section class="feedback">
    <h2 class="feed-back">Feedback</h2>
    <p>Your voice matters to us. Share your feedback, suggestions, or concerns to help us enhance your experience and deliver the exceptional service you deserve.</p>

    <form action="submit_feedback.html" method="post">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Submit Feedback</button>
    </form>
  </section>

  <footer class="foot">
    <p class="in-foot">&copy; 2026 Lim's Royal Boutique. All rights reserved.</p>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navbar = document.querySelector('.navbar');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navbar.classList.toggle('open');
    });
  </script>

</body>
</html>
